name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Validate tag ─────────────────────────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Parse and validate semver tag
        id: parse
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Tag '$TAG_NAME' does not match semver major.minor.patch format"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5

      - name: Verify package.json version matches tag
        env:
          NEW_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$NEW_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($NEW_VERSION)"
            exit 1
          fi
          echo "package.json version $PKG_VERSION matches tag"

      - name: Check version is higher than latest published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          LATEST=$(gh release list \
            --repo "$REPO" \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // ""')

          if [ -z "$LATEST" ]; then
            echo "No existing published release — first release, proceeding."
            exit 0
          fi

          LATEST="${LATEST#v}"
          echo "Comparing new=$NEW_VERSION against latest=$LATEST"

          IFS='.' read -r NEW_MAJ NEW_MIN NEW_PAT <<< "$NEW_VERSION"
          IFS='.' read -r CUR_MAJ CUR_MIN CUR_PAT <<< "$LATEST"

          if   [ "$NEW_MAJ" -gt "$CUR_MAJ" ]; then exit 0
          elif [ "$NEW_MAJ" -eq "$CUR_MAJ" ] && [ "$NEW_MIN" -gt "$CUR_MIN" ]; then exit 0
          elif [ "$NEW_MAJ" -eq "$CUR_MAJ" ] && [ "$NEW_MIN" -eq "$CUR_MIN" ] && [ "$NEW_PAT" -gt "$CUR_PAT" ]; then exit 0
          fi

          echo "ERROR: New version $NEW_VERSION is not strictly greater than latest published $LATEST"
          exit 1

  # ── Lint and test ────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ── Build cross-platform executables ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: build:mac
            artifact_glob: '*.dmg'
            artifact_name: dmg
          - os: windows-latest
            build_script: build:win
            artifact_glob: '*.exe'
            artifact_name: exe
          - os: ubuntu-latest
            build_script: build:linux
            artifact_glob: '*.AppImage'
            artifact_name: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 1

  # ── Create and publish release ────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mapfile -t FILES < <(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \))
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --title "$TAG_NAME" \
            --generate-notes \
            "${FILES[@]}"
